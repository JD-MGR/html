<html>
    <head>
        <link rel="stylesheet" href="social-media.css">
        <title>Social Media Bar</title>
    </head>
    <body>
        <section class="social-section">
<div class="row">
   <div class="icon instagram">
      <img src="insta-removebg-preview.png" alt="insta" class="card-icon">
      <span>@yourusername</span>
   </div>

   <div class="icon whatsapp">
      <img src="whatsapp-removebg-preview.png" alt="whatsapp" class="card-icon">
      <span>@yourusername</span>
   </div>
   </div>
<div class="row">
   <div class="icon youtube">
      <img src="youtube-removebg-preview.png" alt="youtube" class="card-icon">
      <span>@yourusername</span>
   </div>

   <div class="icon telegram">
      <img src="telegram-removebg-preview.png" alt="telegram" class="card-icon">
      <span>@yourusername</span>
   </div>
   </div>
<div class="row">
   <div class="icon facebook">
      <img src="facebook-removebg-preview.png" alt="facebook" class="card-icon">
      <span>@yourusername</span>
   </div>

   <div class="icon linkedin">
      <img src="linkedin-removebg-preview.png" alt="linkedin" class="card-icon">
      <span>@yourusername</span>
   </div>
   </div>
</section>
    </body>
</html>
